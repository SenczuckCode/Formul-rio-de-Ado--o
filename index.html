<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cabeca">
        <p class="titulo">Doação de cachorros</p>
    </div>
    <div class="cabeca_2"></div>
    <div>
        <div class="bloco_de_informacoes">
            <h3 id="cadastro">CADASTRO </h3>


            <form action="" id="formulario">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Nome">
         

                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Email">
                <div id="erroEmail" class="erro"></div>

                <label for="phone">Telefone:</label>
                <input type="text" id="phone" placeholder="Telefone">
                <div id="erroTelefone" class="erro"></div>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="CPF">
                <div id="erroCpf" class="erro"></div>

                <label for="idade">Idade:</label>
                <input type="text" id="idade" placeholder="Idade">
                <div id="erroIdade" class="erro"></div>

                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Cidade">
                <div id="erroCidade" class="erro"></div>
                <br>
                <label for="motivo">Motivo da adoção:</label>
                <br>
                <textarea id="motivo"></textarea>
                <br><br>
                <label for="permite">Se mora em prédio, permite animais?</label>
                <input type="checkbox" class="opcao"  id="permite">
                <br><br>
                <label for="seguro">Se mora em casa, o quintal é seguro?</label>
                <input type="checkbox" class="opcao"  id="seguro"> 
                <br><br>
                <label for="financeiro">Tem condições financeiras?</label>
                <input type="checkbox" class="opcao"  id="financeiro">
                <br><br>
                <label for="espacoExterno">Usa espaço externo?</label>
                <input type="checkbox" class="opcao"  id="espacoExterno">
                <br><br>
                <label for="impulso">Decidiu adotar hoje?</label>
                <input type="checkbox" class="opcao" id="impulso">
                <br><br>

                <label for="moradia">Moradia:</label>

                 <br>
                <label for="casa">Casa:</label>
                <input type="radio" class="opcao" name="tipo_moradia"  value="casa">
                
                <label for="predio">Prédio:</label>
                <input type="radio" class="opcao" name="tipo_moradia" value="apartamento">

                <br> <br>


                 <label for="quintal">Possui quintal:</label>
                 <br>
                <label for="s">Sim:</label>
                <input type="radio" class="opcao" name="tipo_quintal"  value="sim">
                <label for="n">Não:</label>
                <input type="radio" class="opcao" name="tipo_quintal" value="nao">

                 <br> <br>


                 <label for="pet">Já teve pet?:</label>
                 <br>
                <label for="pet">Sim:</label>
                <input type="radio" class="opcao" name="tipo_pet"  value="sim">
                <label for="n">Não:</label>
                <input type="radio" class="opcao" name="tipo_pet" value="nao">

                <br> <br>

                 <label for="horas">Quantas horas fica fora de casa?:</label>
                <input type="text" id="horas" placeholder="tempo">
                <div id="erroTempo" class="erro"></div>
                <br><br>
                <label for="termos">Você aceita os termos?</label>
                <input type="checkbox" id="termos">
                <br><br>
                <button id="button" type="submit">ADOTAR</button>
                </form>
                <div id="resultado"></div>

        </div>


    </div>







    <script src="script.js"></script>
</body>

</html>
