<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="cabeca">
        <p class="titulo">Doação de cachorros</p>
    </div>
    <div class="cabeca_2"></div>
    <div>
        <div class="bloco_de_informacoes">
            <h3 id="cadastro">CADASTRO </h3>


            <form action="" id="formulario">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Nome">
                <div id="erroNome" class="erro"></div>

                <label for="email">Email:</label>
                <input type="text" id="email" placeholder="Email">
                <div id="erroEmail" class="erro"></div>

                <label for="telefone">Telefone:</label>
                <input type="text" id="phone" placeholder="Telefone">
                <div id="erroSenha" class="erro"></div>



        </div>


    </div>







    <script src="script.js"></script>
</body>

</html>
